 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu To Do</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { margin-bottom: 20px; color: #333; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #004085; }
        ul { list-style: none; padding: 0; text-align: left; }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .btn-acao {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            width: auto;
            display: inline;
            padding: 0 5px;
        }
    </style>
</head>
<body>

    <div id="login-section" class="container">
        <h2>Login - Meu To Do</h2>
        <p style="font-size: 12px; color: #666;">Use os dados padrão abaixo:</p>
        <input type="email" id="email" value="aluno@teste.com" readonly>
        <input type="password" id="senha" placeholder="Digite a senha (123)">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="todo-section" class="container" style="display: none;">
        <h2>Minhas Tarefas</h2>
        <input type="text" id="nova-tarefa" placeholder="Digite uma tarefa...">
        <button onclick="adicionarTarefa()">Adicionar</button>
        <ul id="lista-tarefas"></ul>
    </div>

    <script>
    function fazerLogin() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        if (email === "aluno@teste.com" && senha === "123") {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('todo-section').style.display = 'block';
        } else {
            alert("Usuário ou senha incorretos.");
        }
    }

    function adicionarTarefa() {
        const input = document.getElementById('nova-tarefa');
        const tarefa = input.value;
        
        if (tarefa.trim() !== "") {
            const li = document.createElement('li');
            
            // Texto da tarefa
            const spanTexto = document.createElement('span');
            spanTexto.textContent = tarefa;
            li.appendChild(spanTexto);

            // Container dos botões
            const botoesContainer = document.createElement('div');

            // Botão Editar
            const btnEditar = document.createElement('button');
            btnEditar.className = 'btn-acao';
            btnEditar.textContent = '✏️';
            btnEditar.title = 'Editar tarefa';
            btnEditar.onclick = function() {
                const novoTexto = prompt("Edite sua tarefa:", spanTexto.textContent);
                if (novoTexto !== null && novoTexto.trim() !== "") {
                    spanTexto.textContent = novoTexto.trim();
                }
            };

            // Botão Excluir
            const btnExcluir = document.createElement('button');
            btnExcluir.className = 'btn-acao';
            btnExcluir.textContent = '❌';
            btnExcluir.title = 'Excluir tarefa';
            btnExcluir.onclick = function() {
                if (confirm("Deseja mesmo excluir esta tarefa?")) {
                    li.remove();
                }
            };

            botoesContainer.appendChild(btnEditar);
            botoesContainer.appendChild(btnExcluir);
            li.appendChild(botoesContainer);
            
            document.getElementById('lista-tarefas').appendChild(li);
            input.value = "";
        }
    }
    </script>
</body>
</html>
